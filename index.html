<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>华电新生指南</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1 id="app-title">华电新生指南</h1>
        </div>
      </header>

      <section class="search-panel">
        <span class="search-icon" aria-hidden="true"></span>
        <input id="search-input" type="search" placeholder="当前 搜索" autocomplete="off" />
      </section>

      <section class="intro-card card">
        <div class="intro-copy">
          <p id="school-subtitle" class="intro-subtitle">给新同学的入学生活速查手册</p>
          <p id="school-intro" class="intro-text"></p>
          <div id="tag-list" class="tag-list"></div>
        </div>
        <div class="school-mark">NCEPU</div>
      </section>

      <section>
        <div class="section-heading">
          <h2>顶部重要提示</h2>
        </div>
        <div id="notice-list" class="notice-list"></div>
      </section>

      <section>
        <div class="section-heading">
          <h2>分类模块</h2>
          <span id="result-count"></span>
        </div>
        <div id="category-list" class="category-list"></div>
      </section>
    </main>

    <aside class="detail-panel" id="detail-panel" aria-hidden="true">
      <div class="detail-backdrop" id="detail-backdrop"></div>
      <article class="detail-card">
        <button class="close-button" id="close-detail" type="button" aria-label="关闭">×</button>
        <p class="detail-kicker" id="detail-kicker"></p>
        <h2 id="detail-title"></h2>
        <p id="detail-desc" class="detail-desc"></p>
        <p id="detail-date" class="detail-date"></p>
        <div id="detail-content" class="detail-content"></div>
        <p class="detail-contact-note">想了解更多详细信息可加制作组学长联系方式</p>
      </article>
    </aside>

    <script src="./data.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
